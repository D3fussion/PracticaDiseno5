<!doctype html>
<html lang="es-MX" data-theme="light">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Aplicación de notas y tareas personales" />
	<title>Mis Notas</title>
	<link rel="stylesheet" href="./src/css/tailwind.css" />
	<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body class="flex h-screen w-full bg-[#1a1a1a] p-4 font-sans">
	<div
		class="relative flex w-full min-w-0 max-w-7xl mx-auto bg-black rounded-lg overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.7)] border-2 border-[#2a2a2a]">

		<div id="loadingOverlay" role="status" aria-label="Cargando notas"
			class="absolute inset-0 z-50 flex items-center justify-center bg-[#1a1a1a]">
			<span class="loading loading-spinner loading-lg text-white" aria-hidden="true"></span>
		</div>

		<div id="loadingCreateTask" role="status" aria-label="Creando tarea"
			class="absolute inset-0 z-50 items-center justify-center bg-white/50 hidden">
			<span class="loading loading-spinner loading-lg text-black" aria-hidden="true"></span>
		</div>

		<div id="loginWrapper" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">

			<div
				class="w-full max-w-sm bg-gradient-to-b from-[#1b2b4b] to-[#0d1525] border-[2.5px] border-white/90 rounded-[14px] shadow-[0_15px_35px_rgba(0,0,0,0.8)] p-5 relative overflow-hidden">

				<div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>

				<h2
					class="text-white text-center font-bold text-xl mb-4 drop-shadow-[0_-1px_1px_rgba(0,0,0,1)] tracking-wide">
					Iniciar Sesión
				</h2>

				<div id="loginOverlay" class="space-y-4 relative z-10">

					<div
						class="bg-white rounded-lg overflow-hidden border border-[#555] shadow-[inset_0_2px_5px_rgba(0,0,0,0.4)]">
						<input type="email" placeholder="Correo electrónico" id="auth-email"
							class="w-full px-3 py-2.5 text-base text-black placeholder-gray-400 border-b border-gray-300 focus:outline-none focus:bg-[#eef3ff]" />
						<input type="password" placeholder="Contraseña" id="auth-password"
							class="w-full px-3 py-2.5 text-base text-black placeholder-gray-400 focus:outline-none focus:bg-[#eef3ff]" />
					</div>

					<div class="space-y-2 mt-2">

						<button id="btn-login-pass"
							class="w-full relative group rounded-lg border border-[#142e66] shadow-[0_1px_3px_rgba(0,0,0,0.6)] overflow-hidden font-bold text-white text-base py-2.5 drop-shadow-[0_-1px_1px_rgba(0,0,0,0.8)] active:scale-[0.98] transition-transform">
							<div
								class="absolute inset-0 bg-linear-to-b from-[#7093db] via-[#3f67c2] to-[#2147a3] group-active:from-[#496fb8] group-active:to-[#173378]">
							</div>
							<div
								class="absolute top-0 left-0 right-0 h-1/2 bg-linear-to-b from-white/50 to-white/5 rounded-t-lg">
							</div>
							<span class="relative z-10">Iniciar sesión</span>
						</button>

						<button id="btn-login-huella"
							class="w-full relative group rounded-lg border border-[#222] shadow-[0_1px_3px_rgba(0,0,0,0.6)] overflow-hidden font-bold text-white text-base py-2.5 drop-shadow-[0_-1px_1px_rgba(0,0,0,0.8)] active:scale-[0.98] transition-transform">
							<div
								class="absolute inset-0 bg-linear-to-b from-[#8c8c8c] via-[#595959] to-[#363636] group-active:from-[#666666] group-active:to-[#262626]">
							</div>
							<div
								class="absolute top-0 left-0 right-0 h-1/2 bg-linear-to-b from-white/40 to-white/5 rounded-t-lg">
							</div>
							<span class="relative z-10">Con datos biométricos</span>
						</button>

						<button id="btn-register"
							class="w-full relative group rounded-lg border border-[#222] shadow-[0_1px_3px_rgba(0,0,0,0.6)] overflow-hidden font-bold text-white text-base py-2.5 drop-shadow-[0_-1px_1px_rgba(0,0,0,0.8)] active:scale-[0.98] transition-transform">
							<div
								class="absolute inset-0 bg-linear-to-b from-[#8c8c8c] via-[#595959] to-[#363636] group-active:from-[#666666] group-active:to-[#262626]">
							</div>
							<div
								class="absolute top-0 left-0 right-0 h-1/2 bg-linear-to-b from-white/40 to-white/5 rounded-t-lg">
							</div>
							<span class="relative z-10">Crear cuenta</span>
						</button>

						<p id="mensajeLogin" class="mt-4 text-white">

						</p>

					</div>
				</div>
			</div>
		</div>

		<aside aria-label="Lista de notas (escritorio)"
			class="hidden lg:flex w-80 flex-col bg-[#f9f9f9] relative z-10 border-r-[3px] border-black">
			<div class="bg-linear-to-b from-[#f5f5f5] to-[#e0e0e0] border-b border-gray-400 pb-2">
				<h2 id="cantidadNotasDesktop"
					class="text-center text-gray-800 font-bold py-2 text-sm shadow-[0_1px_0_white_inset]">
					Notas
				</h2>

				<form id="buscarNotas" role="search" class="px-3 mt-1">
					<label
						class="input outline-transparent w-full bg-white border border-gray-400 rounded-full py-1 text-sm focus:outline-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-300 ease-in-out">
						<svg aria-hidden="true" class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg"
							viewBox="0 0 24 24">
							<g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
								stroke="currentColor">
								<circle cx="11" cy="11" r="8"></circle>
								<path d="m21 21-4.3-4.3"></path>
							</g>
						</svg>
						<input id="inputBuscarDesktop" type="search" placeholder="Buscar" aria-label="Buscar nota" />
					</label>
				</form>

			</div>

			<div class="flex-1 overflow-y-auto bg-[#f9f9f9]">
				<ul id="listaTareas" aria-label="Notas guardadas" class="text-sm font-bold text-gray-700">

				</ul>
			</div>

			<div class="absolute bottom-0 left-0 w-32 h-32 bg-linear-to-tr from-[#111] to-[#222] shadow-[inset_2px_2px_10px_rgba(255,255,255,0.1)] z-20"
				aria-hidden="true" style="clip-path: polygon(0 100%, 0 0, 100% 100%);">
				<div
					class="absolute inset-0 border-t-2 border-dashed border-[#555] opacity-50 transform -rotate-45 translate-y-[45px] -translate-x-[20px]">
				</div>
			</div>

		</aside>

		<div class="drawer flex-1 min-w-0">
			<input id="my-drawer-1" type="checkbox" class="drawer-toggle" />

			<main class="drawer-content flex flex-col relative bg-[#fdf6b3] h-full">

				<header
					class="justify-between h-14 bg-linear-to-b from-[#6b4226] via-[#4d2d18] to-[#361f10] border-b-[3px] border-dashed border-[#8a5d3b] flex items-center px-4 shadow-[0_5px_10px_rgba(0,0,0,0.5)] z-20 relative">
					<div class="w-8 hidden lg:block" aria-hidden="true"></div>

					<label for="my-drawer-1" aria-label="Abrir menú de notas"
						class="flex lg:hidden cursor-pointer transition-all duration-300 ease-in-out bg-linear-to-b from-[#8c6046] to-[#593822] active:scale-[0.85] text-[#f0e6d2] font-bold text-xl leading-none w-8 h-8 rounded-md border border-[#2a170b] shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] items-center justify-center">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
							aria-hidden="true" class="lucide lucide-menu-icon lucide-menu">
							<path d="M4 5h16" />
							<path d="M4 12h16" />
							<path d="M4 19h16" />
						</svg>
					</label>

					<div id="tituloNotaContainer" class="flex items-center justify-center gap-2">
						<span class="loading loading-spinner loading-sm text-white hidden" aria-hidden="true"></span>
						<h1
							class="titulo-nota truncate text-center transition-all duration-300 ease-in-out text-white font-bold text-lg drop-shadow-[0_1px_1px_rgba(0,0,0,1)]">
							Tarea 1
						</h1>
						<button onclick="editarTituloActual()" aria-label="Editar título de la nota"
							class="text-white cursor-pointer hover:text-[#f0e6d2] transition-all duration-300 ease-in-out active:scale-[0.85] bg-transparent border-none p-0 flex items-center">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
								stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
								aria-hidden="true" class="lucide lucide-pencil-icon lucide-pencil w-4 h-4">
								<path
									d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
								<path d="m15 5 4 4" />
							</svg>
						</button>
					</div>

					<div class="flex gap-2">
						<button onclick="crearTaskHTML()" aria-label="Crear nueva nota"
							class="cursor-pointer transition-all duration-300 ease-in-out bg-linear-to-b from-[#8c6046] to-[#593822] active:scale-[0.85] text-[#f0e6d2] font-bold text-xl leading-none w-8 h-8 rounded-md border border-[#2a170b] shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] flex items-center justify-center">
							<span aria-hidden="true">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
									stroke="currentColor" stroke-width="2" stroke-linecap="round"
									stroke-linejoin="round" class="w-5 h-5">
									<path d="M5 12h14" />
									<path d="M12 5v14" />
								</svg>
							</span>
						</button>
						<button onclick="cerrarSesion()" aria-label="Cerrar sesión"
							class="cursor-pointer transition-all duration-300 ease-in-out bg-linear-to-b from-[#8c6046] to-[#593822] active:scale-[0.85] text-[#f0e6d2] font-bold text-xl leading-none w-8 h-8 rounded-md border border-[#2a170b] shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] flex items-center justify-center">
							<span aria-hidden="true">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
									stroke="currentColor" stroke-width="2" stroke-linecap="round"
									stroke-linejoin="round" class="w-5 h-5">
									<path d="m16 17 5-5-5-5" />
									<path d="M21 12H9" />
									<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
								</svg>
							</span>
						</button>
					</div>
				</header>

				<div class="relative flex w-full h-full">
					<div class="absolute left-8 lg:left-16 top-0 bottom-0 w-px bg-red-400/50 z-10 pointer-events-none"
						aria-hidden="true">
					</div>
					<div class="absolute left-[36px] lg:left-[68px] top-0 bottom-0 w-px bg-red-400/50 z-10 pointer-events-none"
						aria-hidden="true">
					</div>

					<textarea id="descripcionNota" aria-label="Contenido de la nota"
						class="flex-1 overflow-y-auto text-[22px] text-black font-handwriting leading-[32px] pl-12 xs:pl-16 lg:pl-24 outline-none resize-none"
						style="background-image: repeating-linear-gradient(transparent, transparent 31px, #e2d596 31px, #e2d596 32px); background-attachment: local;">
					</textarea>
				</div>

				<footer
					class="h-12 bg-[#fdf6b3] border-t border-[#d9cc8b] flex justify-center items-center gap-16 text-[#8b7d46] z-11 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
					<button onclick="anteriorTask()" aria-label="Nota anterior"
						class="text-2xl cursor-pointer hover:text-[#5c522e] transition-all duration-300 ease-in-out active:scale-[0.85] bg-transparent border-none">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
							aria-hidden="true" class="lucide lucide-arrow-left-icon lucide-arrow-left">
							<path d="m12 19-7-7 7-7" />
							<path d="M19 12H5" />
						</svg>
					</button>
					<button onclick="eliminarTaskActual()" aria-label="Eliminar nota actual"
						class="text-2xl cursor-pointer hover:text-[#5c522e] transition-all duration-300 ease-in-out active:scale-[0.85] bg-transparent border-none">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
							aria-hidden="true" class="lucide lucide-trash-icon lucide-trash">
							<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
							<path d="M3 6h18" />
							<path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
						</svg>
					</button>
					<button onclick="siguienteTask()" aria-label="Nota siguiente"
						class="text-2xl cursor-pointer hover:text-[#5c522e] duration-300 ease-in-out active:scale-[0.85] transition-all bg-transparent border-none">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
							aria-hidden="true" class="lucide lucide-arrow-right-icon lucide-arrow-right">
							<path d="M5 12h14" />
							<path d="m12 5 7 7-7 7" />
						</svg>
					</button>
				</footer>

			</main>

			<aside aria-label="Lista de notas (móvil)" class="drawer-side z-50">
				<label for="my-drawer-1" aria-label="Cerrar menú de notas" class="drawer-overlay"></label>
				<div class="flex flex-col w-80 min-h-full bg-[#f9f9f9] relative border-r-[3px] border-black">
					<div class="relative bg-linear-to-b from-[#f5f5f5] to-[#e0e0e0] border-b border-gray-400 pb-2">
						<h2 id="cantidadNotas"
							class="text-center text-gray-800 font-bold py-2 text-sm shadow-[0_1px_0_white_inset]">
							1 Nota
						</h2>
						<label for="my-drawer-1" aria-label="Cerrar menú de notas"
							class="absolute top-2 right-3 cursor-pointer transition-all duration-300 ease-in-out active:scale-[0.85] text-gray-600 border border-gray-400 bg-white rounded-full w-6 h-6 flex items-center justify-center shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
								stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
								aria-hidden="true" class="w-4 h-4">
								<path d="m6 6 12 12" />
								<path d="m18 6-12 12" />
							</svg>
						</label>
						<form role="search" class="px-3 mt-1">
							<label
								class="input outline-transparent w-full bg-white border border-gray-400 rounded-full py-1 text-sm focus:outline-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-300 ease-in-out">
								<svg aria-hidden="true" class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg"
									viewBox="0 0 24 24">
									<g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
										stroke="currentColor">
										<circle cx="11" cy="11" r="8"></circle>
										<path d="m21 21-4.3-4.3"></path>
									</g>
								</svg>
								<input id="inputBuscarDrawer" type="search" placeholder="Buscar"
									aria-label="Buscar nota" />
							</label>
						</form>
					</div>
					<div class="flex-1 overflow-y-auto bg-[#f9f9f9]">
						<ul id="listaTareasDrawer" aria-label="Notas guardadas" class="text-sm font-bold text-gray-700">

						</ul>
					</div>
					<div class="absolute bottom-0 left-0 w-32 h-32 bg-linear-to-tr from-[#111] to-[#222] shadow-[inset_2px_2px_10px_rgba(255,255,255,0.1)] z-20"
						aria-hidden="true" style="clip-path: polygon(0 100%, 0 0, 100% 100%);">
						<div
							class="absolute inset-0 border-t-2 border-dashed border-[#555] opacity-50 transform -rotate-45 translate-y-[45px] -translate-x-[20px]">
						</div>
					</div>
				</div>
			</aside>

		</div>
	</div>

	<template id="tarea-lista-template">
		<li class="tarea-lista-inactiva">
			<span class="tarea-lista-titulo truncate flex-1"></span>
			<span class="tarea-lista-fecha text-xs text-gray-400 font-normal"></span>
		</li>
	</template>

	<template id="input-cambiar-titulo-template">
		<label
			class="input h-fit py-1 outline-transparent text-gray-400 w-full bg-white border border-gray-400 rounded-full px-4 text-sm focus:outline-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-300 ease-in-out">
			<input class="input-cambiar-titulo" type="text" required aria-label="Nuevo título de la nota" />
		</label>
	</template>

	<template id="titulo-nota-template">
		<span class="loading loading-spinner loading-sm text-white hidden" aria-hidden="true"></span>
		<h1
			class="titulo-nota truncate text-center transition-all duration-300 ease-in-out text-white font-bold text-lg drop-shadow-[0_1px_1px_rgba(0,0,0,1)]">
			Nota 1
		</h1>
		<button onclick="editarTituloActual()" aria-label="Editar título de la nota"
			class="text-white cursor-pointer hover:text-[#f0e6d2] transition-all duration-300 ease-in-out active:scale-[0.85] bg-transparent border-none p-0 flex items-center">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
				class="lucide lucide-pencil-icon lucide-pencil w-4 h-4">
				<path
					d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
				<path d="m15 5 4 4" />
			</svg>
		</button>
	</template>



	<script type="module" src="./src/js/main.js"></script>
</body>

</html>
